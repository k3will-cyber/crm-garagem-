[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# Redireciona chamadas /api/* para o backend em produção
# Altere a URL abaixo para o endereço do seu backend (Render, Railway, etc.)
[[redirects]]
  from = "/api/*"
  to = "https://crm-garagem-backend.up.railway.app/api/:splat"
  # ⚠️ Substitua a URL acima pela URL real do seu backend no Railway após o deploy
  # Para obter a URL: Railway > Seu Projeto > Settings > Generate Domain
  status = 200
  force = true

# Redireciona todas as outras rotas para o index.html (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
